<div class="registro">
    <div class="content">
        <div class="text">
            Registro de Usuario
        </div>
        <form (ngSubmit)="registrar()">

            <div class="field">
                <input required="" type="text" class="input" [(ngModel)]="usuario" name="usuario">
                <span class="span">
                    <mat-icon>person</mat-icon>
                </span>
                <label class="label">Ingresar Usuario</label>
            </div>

            <div class="field">
                <input required="" type="text" class="input" [(ngModel)]="nombre" name="nombre">
                <span class="span">
                    <mat-icon>perm_identity</mat-icon>
                </span>
                <label class="label">Nombre Completo</label>
            </div>

            <div class="field">
                <input required="" [type]="mostrarClave ? 'text' : 'password'"  class="input" [(ngModel)]="clave" name="clave">
                <span class="span">
                    <mat-icon>fingerprint</mat-icon>
                </span>
                <label class="label">Ingresar Contraseña</label>
                <button type="button" class="toggle-password" (click)="toggleMostrarClave()">
                    <mat-icon>{{ mostrarClave ? 'visibility_off' : 'visibility' }}</mat-icon>
                </button>
            </div>

            <div class="field">
                <input required="" [type]="mostrarClaveConfirmacion ? 'text' : 'password'"  class="input" [(ngModel)]="confirmarclave" name="confirmarclave">
                <span class="span">
                    <mat-icon>fingerprint</mat-icon>
                </span>
                <label class="label">Confirmar Contraseña</label>
                <button type="button" class="toggle-password" (click)="toggleMostrarClaveConfirmacion()">
                    <mat-icon>{{ mostrarClaveConfirmacion ? 'visibility_off' : 'visibility' }}</mat-icon>
                </button>
            </div>
            
            <button class="button">Acceder</button>
            <div class="inicio-sesion">
                ¿Ya tienes cuenta?
                <a routerLink="/autenticacion/acceso">Iniciar Sesion</a>
            </div>
        </form>
    </div>
</div>
