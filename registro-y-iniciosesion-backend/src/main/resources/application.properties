spring.application.name=registro-y-iniciosesion-backend


# ===========================
# CONFIGURACIÓN DE LA BASE DE DATOS
# ===========================

# URL de conexión JDBC a MySQL:
spring.datasource.url = jdbc:mysql://localhost:3306/sistemas_inventario
# Usuario de la base de datos
spring.datasource.username = root
# Contraseña del usuario
spring.datasource.password = delloptiplex


# ===========================
# CONFIGURACIÓN DE JPA + HIBERNATE
# ===========================

# Cómo gestionar las tablas automáticamente:
# update     -> actualiza tablas sin borrar datos
spring.jpa.hibernate.ddl-auto = update
# Mostrar en consola las consultas SQL
spring.jpa.show-sql = true
# Formatear (embellecer) el SQL mostrado en consola
spring.jpa.properties.hibernate.format_sql= true
# Dialecto para que Hibernate genere SQL compatible con MySQL
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect
